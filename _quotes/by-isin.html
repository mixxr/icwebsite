<div class="container">
<p>Insert an ISIN to get the quote. Optionally select the timespan.</p>

<select name="timespan" id="timespan">
  <option value="">--Please choose an option--</option>
  <option value="2">2 days</option>
  <option value="5">1 week</option>
</select>

<label>ISIN</label>
<input name="isin" id="isin"/>

<button id="getQuote">Get Quote</button>
<script>
document.getElementById('getQuote').addEventListener('click', function() {
    let isin = document.getElementById('isin').value;
    let timespan = document.getElementById('timespan').value;
    console.log('Getting quote for ISIN:', isin, 'with timespan:', timespan);
    // redirect to /quotes?isin=<isin>&timespan=<timespan>
    let url = '/quotes?isin=' + isin;
    if (timespan) {
        url += '&timespan=' + timespan;
    }
    window.location.href = url;
});
</script>
</div>

<script type="module">
  // mermaid initialization and configuration
  import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs';
  const config = {
    startOnLoad: false,
    securityLevel: "loose",
    sankey: {
      showValues: false,
      linkColor: "target",
    },
  };
  mermaid.initialize(config);

  async function renderMermaid(gText, gArea) {
    const { svg } = await mermaid.render('mermaid', gText);
    gArea.innerHTML = svg;
  }
  // END of mermaid initialization and configuration

  // mermaid preview textarea onchange
  let t = document.getElementById("mm_preview");
  t.onchange = function () {
    console.log("[mermaid] preview::change...", mermaid, t.value, this.value);
    let g = document.getElementsByClassName("mermaid")[0];
    // g.innerHTML = t.value;
    // mermaid.run({
    //         nodes: document.getElementsByClassName("mermaid"),
    // });
    renderMermaid(t.value, g);
  };

</script>

<script>
  // helper functions
  const CERT_MAX_LEN = 35;
  const normalize = (str) =>
    str
      .normalize("NFD")                 // split accents
      .replace(/[\u0300-\u036f]/g, "")  // remove accents
      .replaceAll(",", "-")             // replace commas
      .trim();
  const cutIf = (str, maxLen) =>
    str.length > maxLen
          ? str.slice(0, maxLen) + "..."
          : str;

  function transformJsonToCsv(data, direction = 'source-to-target') {
    // 1. Count occurrences of each certificate
    const certCounts = data.reduce((acc, item) => {
      acc[item.certificate] = (acc[item.certificate] || 0) + 1;
      return acc;
    }, {});

    // 2. Map data to CSV rows with the calculated integer
    const csvRows = data.map(item => {
      const totalForCert = certCounts[item.certificate];
      const weight = Math.round(100 / totalForCert); // Using Math.round for "approx"
      if (direction === 'source-to-target') {
        return `${item.certificate}, ${item.ticker}, ${weight}`;
      } else {
        return `${item.ticker}, ${item.certificate}, ${weight}`;
      }
    });

    return csvRows.join('\n');
  }

 const transformArrayToCsv = (data, direction = 'source-to-target') => {
  // First pass: count occurrences of each certificate (parsed from the string)
  const certCounts = data.reduce((acc, row) => {
    const [isin, certificate] = row.split(';').map(s => s.trim());
    acc[isin] = (acc[isin] || 0) + 1;
    return acc;
  }, {});

  // Second pass: build CSV rows
  return data
    .map(row => {
      console.log("[mermaid] Processing row:", row);
      const [isin, certificate_long, ticker, stock_name, stock_isin] = row.split('{{ site.col_sep }}').map(s => normalize(s));

      const certificate = cutIf(certificate_long, CERT_MAX_LEN);
      const weight = Math.round(100 / certCounts[isin]);

      return direction === 'source-to-target'
        ? `${certificate} (${isin}), ${stock_name} (${ticker}), ${weight}`
        : `${stock_name} (${ticker}), ${certificate} (${isin}), ${weight}`;
    })
    .join('\n');
};

// END of helper functions

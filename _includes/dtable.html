{% if page.dataTableUrl %}

<!-- DataTables  js if async => lines#74 does not work properly -->
<script type="text/javascript" id="datatables-script" src="//code.jquery.com/jquery-3.5.1.min.js"></script>
<script type="text/javascript" id="jquery-script" src="//cdn.datatables.net/2.3.7/js/dataTables.min.js"></script>

<!-- First, this walks through the tables that occur between ...-begin
         and ...-end and add the "datatable" class to them.
         Then it invokes DataTable's standard initializer
         Credit here: http://www.beardedhacker.com/blog/2015/08/28/add-class-attribute-to-markdown-table/
      -->
<script>
    console.log('DataTables starting...');

    getData = async function (redirect = true) {
        console.log('DataTables getData called');
        try {
            // retrieve the path from the data attribute (data-dt-path) of the table element with id "dTable" and concat with page.dataTableUrl
            //let dtPath = $('#dTable').data('dt-path');
            let url = '{{ page.dataTableUrl }}'; // it is in format http://host:port/path/$param1/$param2, so we need to replace :param1 and :param2 with actual values
            // extract param names from the url variable, which are in format $param1, $param2, etc. and store them in an array
            let paramNames = url.match(/\$[a-zA-Z0-9_]+/g);
            console.log('Fetching data from', url, 'with params', paramNames);
            // get querystring parameters if paramNames is not empty and replace $param with actual value from querystring
            if (paramNames &&paramNames.length > 0) {
                // remove $ from param names
                paramNames = paramNames.map(param => param.substring(1));
                let queryString = new URLSearchParams(window.location.search);
                // loop through paramNames and replace $param with actual value from querystring
                paramNames.forEach(param => {
                    let value = queryString.get(param);
                    if (value) {
                        url = url.replace('$' + param, value);
                    }
                });
            }
            console.log('Fetching data from', url);
            let response = await fetch(url);
            const data = await response.json();
            //     url: '{{ page.dataTableUrl }}',
            //     //crossDomain: true, 
            //     prefetch: false,
            //     dataSrc: '',
            //   });
            console.log('DataTables data loaded:', data.length, data);
            // check if HTTP status is not 200, then throw error
            if (!response.ok) {
                throw new Error('Network response was not ok: ' + response.statusText);
                if (redirect) {
                    window.location.href = '/404.html';
                }
            }
            // remove 1st row because it contains column names, not data
            data.shift();
            let ret = data.map(function (item) {
                return item.split(','); // wrap each string in an array
            });
            return ret;

        } catch (error) {
            console.error('Error in getData:', error);
            // if (redirect) {
            //     window.location.href = '/404.html';
            // }
            return [];
        }
    };
    var table = new DataTable('#dTable');
    $(document).ready(function () {
        console.log('DataTables document ready');

        getData().then(function (data) {
            console.log('DataTables data received:', data);
            //   table.on('order', () => console.log('DataTables data received:', 'order'))
            //        .on('search', () => console.log('DataTables data received:', 'search'))
            //        .on('select', () => console.log('DataTables data received:', 'select'))
            //        .on('user-select', () => console.log('DataTables data received:', 'user-select'));
// https://blog.devgenius.io/making-use-of-columndefs-option-in-datatables-bc0fcc23f793
            table.clear().draw();
            table.destroy();
            table = new DataTable('#dTable', {
                //ajax: 'http://localhost:8090/sources'
                data: data,
                columnDefs: [
                    {
                        targets: [0],
                        data: 'download_link',
                        render: function (data, type, row, meta) {
                            // let queryString = new URLSearchParams(window.location.search);
                            // let param1 = queryString.get('source');
                            // if (!param1) {
                            //     param1 = '';
                            // }
                            // return '<a href="/quotes?source={{page.slug}}' + param1 + '&isin=' + row[0] + '">' + row[0] + '</a>';
                            return '<a href="/quotes?source=' + row[0] + '">' + row[0] + '</a>';
                        }
                    }
                ]});
        });
    });
</script>
{%- endif %}

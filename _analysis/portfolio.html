---
layout: page
title: Portfolio Analysis
subtitle: How a single company can influence your portfolio
footer-extra: mermaid-footer.html
comments: false
hasMermaid: true

---
<div class="tool-container">

  <!-- Chart -->
  <div class="tool-section">
    <pre class="mermaid"></pre>
  </div>

  <!-- Input controls -->
  <div class="tool-section">
    <label for="cert_select" class="tool-label">
      Select a certificate or paste a list of ISINs:
    </label>

    <select name="cert_select" id="cert_select" class="tool-input">
      <option value="">-- Choose a certificate --</option>
    </select>

    <textarea id="cert_csv_list" class="tool-input" rows="3" placeholder="DE000VG656A7, NLBNPIT30309"></textarea>
  </div>

  <!-- Actions -->
  <div class="tool-actions">
    <button id="btnPrimary" class="btn btn-primary">
      Load Data
    </button>
    <button id="btnSwap" class="btn btn-secondary">
      Swap Certs ↔ Tickers
    </button>
  </div>

</div>

<textarea id="mm_preview" hidden></textarea>

<script>
  let render = function (versus) {
    const data = transformArrayToCsv(certs_ticker_data, swapSwitch ? 'target-to-source' : 'source-to-target');
    let preview = document.getElementById("mm_preview");
    preview.value = "  sankey-beta\n" + data;

    preview.onchange();
  }; // render

  // Loading cert ISINs into the input cert_select
  console.log('Loading Certificates URL: {{ site.wsUrl }}/certificates-tickers/*');
  var secret = "{{ site.wsSecret }}";
  fetch('{{ site.wsUrl }}/certificates-tickers/*', {
    method: "GET",
    headers: {
      "Content-Type": "application/json",
      "Authorization": "Bearer " + secret
    }
  })
    .then(response => response.json())
    .then(data => {
      const uniqueSorted = [...new Set(data)].sort();
      console.log('Certs retrieved:', data, data.length, uniqueSorted.length);
      const select = document.getElementById('cert_select');
      uniqueSorted.forEach(cert => {
        // split ticketer by comma and take the first part as the ticker name
        value = cert.split(';')[0];
        name = cert.split(';')[1];
        const option = document.createElement('option');
        option.value = value;
        option.textContent = name + ' (' + value + ')';
        select.appendChild(option);
      });
    })
    .catch(error => console.error('Error fetching Certs/Tickers:', error)); // cert_select


  // button btnSwap
  let swapSwitch = false;
  let certs_ticker_data = [];
  document.getElementById('btnSwap').onclick = function () {
    swapSwitch = !swapSwitch;
    render(swapSwitch ? 'target-to-source' : 'source-to-target');
  }; // .btnSwap::onclick

  // button btnPrimary
  document.getElementById('btnPrimary').onclick = async function () {
    let cert_isins = document.getElementById('cert_csv_list').value || document.getElementById('cert_select').value;
    // if (cert_isins == "") 
    //   cert_isins = document.getElementById('cert_select').value;

    console.log("Selected certs: ", '{{ site.wsUrl }}/certificates-tickers/', cert_isins);
    var secret = "{{ site.wsSecret }}";
    fetch('{{ site.wsUrl }}/certificates-tickers/' + cert_isins, {
      method: "GET",
      headers: {
        "Content-Type": "text/plain",
        "Authorization": "Bearer " + secret
      }
    })
      .then(response => response.json())
      .then(dataRaw => {
        console.log("test::data:", dataRaw);
        certs_ticker_data = dataRaw;
        render('source-to-target');
      });
  }; // .btnPrimary::onclick
</script>
